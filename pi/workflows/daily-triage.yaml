# Daily Triage Workflow — pi 集成定义
# 工作日每天早上执行日常分类

name: daily-triage
description: 日常任务分类 — 扫描 CI、Issue、PR、提交记录，生成优先级报告

# 触发条件
trigger:
  # 工作日早上 9 点（Asia/Shanghai, UTC+8）= UTC 时间 1 点
  # Cron 表达式基于 UTC，所以 UTC+8 早上 9 点 → '0 1 * * 1-5'
  type: schedule
  cron: '0 1 * * 1-5'  # Mon-Fri 09:00 Asia/Shanghai (UTC+8)
  # 或手动触发
  manual: true

# 使用的技能
skills:
  - loop-triage
  - loop-budget

# 自动化等级
level: L1  # 报告模式，不自动修复

# 输入源
inputs:
  - type: github
    resource: ci_failures
    params:
      branch: main
      since: 24h
  - type: github
    resource: open_issues
    params:
      state: open
      assignee: current_user
  - type: github
    resource: recent_commits
    params:
      branch: main
      since: 48h
  - type: file
    resource: state
    path: STATE.md

# 输出
outputs:
  - type: file
    path: STATE.md
    action: update
    section: High Priority
  - type: console
    format: markdown
    sections:
      - High-Priority Items
      - Watch Items
      - Noise / Ignore
      - State Updates

# 预算控制
budget:
  daily_cap: 100000  # tokens
  per_run_cap: 50000
  check_before_run: true

# 约束
constraints:
  max_high_priority_items: 5
  report_only: true  # L1 模式不自动修复
  working_hours_only: false

# 错误处理
on_error:
  - action: log
    level: error
  - action: notify
    channel: state_file
    message: "Triage failed — check logs"

# 成功处理
on_success:
  - action: append_log
    file: loop-run-log.md
    format: json
  - action: update_state
    field: Last run
    value: "{{timestamp}}"

# 示例输出
example_output: |
  # Triage Report — 2026-07-09

  ## High-Priority Items

  - **CI Failure: test-suite failing**
    - Impact: Blocking all PR merges
    - Suggested: Draft minimal fix in isolated worktree
    - Effort: ~15 min

  ## Watch Items

  - PR #456 needs rebase

  ## Noise / Ignore

  - Flaky test (already tracked)

  ## State Updates

  - CI passing after fix in commit abc123
